<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>課前考數學考卷產生器</title>
<style>
  :root{
    --bg:#f4f6fb; --card:#fff; --line:#e2e6ef; --ink:#1f2937;
    --accent:#2563eb; --accent-d:#1e40af; --muted:#6b7280; --soft:#eef2ff;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;
       background:var(--bg);color:var(--ink);font-size:15px;line-height:1.6}
  .layout{display:grid;grid-template-columns:360px 1fr;min-height:100vh}
  /* ---------- 控制面板 ---------- */
  .panel{background:var(--card);border-right:1px solid var(--line);padding:18px;overflow-y:auto;height:100vh}
  .panel h1{font-size:18px;margin:0 0 4px}
  .panel .sub{color:var(--muted);font-size:12px;margin-bottom:16px}
  .group{margin-bottom:16px}
  .group > label{display:block;font-weight:600;font-size:13px;margin-bottom:6px}
  select,input[type=text],input[type=number]{
    width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:14px;background:#fff}
  .row{display:flex;gap:8px}
  .row > *{flex:1}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{padding:6px 12px;border:1px solid var(--line);border-radius:20px;cursor:pointer;font-size:13px;background:#fff;user-select:none}
  .chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .units{border:1px solid var(--line);border-radius:8px;max-height:300px;overflow-y:auto}
  .unit{display:flex;align-items:center;gap:8px;padding:7px 10px;border-bottom:1px solid var(--line)}
  .unit:last-child{border-bottom:none}
  .unit input[type=checkbox]{width:16px;height:16px;flex:0 0 auto}
  .unit .nm{flex:1;font-size:13px}
  .unit .nm small{color:var(--muted);display:block;font-size:11px}
  .unit .cnt{flex:0 0 56px}
  .unit.nogen .nm{color:var(--muted)}
  .btns{display:flex;flex-direction:column;gap:8px;margin-top:8px}
  button{font-family:inherit;font-size:14px;padding:10px;border:none;border-radius:8px;cursor:pointer;font-weight:600}
  .b-primary{background:var(--accent);color:#fff}
  .b-primary:hover{background:var(--accent-d)}
  .b-soft{background:var(--soft);color:var(--accent-d)}
  .b-line{background:#fff;border:1px solid var(--line);color:var(--ink);font-weight:500}
  .toggle{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;cursor:pointer}
  .hint{font-size:11px;color:var(--muted);margin-top:4px}
  details{border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-top:8px}
  summary{cursor:pointer;font-weight:600;font-size:13px}
  /* ---------- 預覽區 ---------- */
  .preview{padding:24px;overflow-y:auto;height:100vh;background:#e9edf5}
  .paper{background:#fff;width:210mm;min-height:297mm;margin:0 auto 24px;padding:18mm 16mm;
         box-shadow:0 2px 14px rgba(0,0,0,.12);color:#000}
  .paper-head{border-bottom:2px solid #000;padding-bottom:8px;margin-bottom:14px}
  .paper-head .title{font-size:22px;font-weight:800;text-align:center;letter-spacing:2px}
  .paper-head .meta{display:flex;justify-content:space-between;font-size:13px;margin-top:8px;gap:12px;flex-wrap:wrap}
  .paper-head .meta .fill{border-bottom:1px solid #000;flex:1;min-width:60px;display:inline-block}
  .sec-title{font-weight:700;font-size:15px;margin:14px 0 8px;background:#f0f0f0;padding:4px 8px;border-left:4px solid #000}
  .qgrid{display:grid;gap:10px 18px}
  .q{display:flex;gap:6px;font-size:15px;align-items:baseline;break-inside:avoid;min-height:34px}
  .q .no{font-weight:700;flex:0 0 auto}
  .q .body{flex:1}
  .q .ans-line{display:inline-block;border-bottom:1px solid #888;min-width:70px}
  .answers .q .body{color:#b91c1c;font-weight:600}
  .steps{margin-top:4px;color:#374151;font-size:13px;font-weight:400}
  .steps div{margin:1px 0}
  .empty{color:#9aa1ad;text-align:center;padding:80px 0;font-size:15px}
  .frac{display:inline-flex;flex-direction:column;text-align:center;vertical-align:middle;margin:0 2px;line-height:1.05}
  .mexp{display:inline-flex;align-items:center;gap:.2em;flex-wrap:wrap;vertical-align:middle}
  .frac .n{border-bottom:1.4px solid currentColor;padding:0 3px}
  .frac .d{padding:0 3px}
  /* ---------- 手機收合抽屜 (RWD) ---------- */
  .panel-toggle{display:none;position:fixed;top:10px;left:10px;z-index:50;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,.25);cursor:pointer}
  .panel-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:40}
  @media (max-width:820px){
    .layout{display:block}
    .panel-toggle{display:block}
    .panel{position:fixed;top:0;left:0;height:100vh;width:86%;max-width:340px;z-index:45;transform:translateX(-100%);transition:transform .25s ease;box-shadow:2px 0 16px rgba(0,0,0,.25)}
    body.panel-open .panel{transform:translateX(0)}
    body.panel-open .panel-backdrop{display:block}
    .preview{height:auto;min-height:100vh;padding:56px 10px 24px}
    .paper{width:auto;max-width:100%;min-height:auto;padding:10mm 8mm;margin:0 auto 16px}
    .qgrid{grid-template-columns:1fr !important}
  }
  .regen-fab{position:fixed;right:16px;bottom:16px;z-index:50;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;font-size:22px;border:none;box-shadow:0 3px 12px rgba(0,0,0,.3);cursor:pointer}
  .regen-fab:active{transform:scale(.92)}
  @media print{
    .panel,.panel-toggle,.panel-backdrop,.regen-fab{display:none}
    .layout{display:block}
    .preview{padding:0;background:#fff;height:auto;overflow:visible}
    .paper{box-shadow:none;margin:0;width:auto;min-height:auto;padding:12mm 12mm}
    .paper.pb{page-break-before:always}
    @page{size:A4;margin:0}
  }
</style>
</head>
<body>
<button class="panel-toggle" id="panelToggle">☰ 設定</button>
<button class="regen-fab" id="regenFab" title="重新生成考卷">🔄</button>
<div class="panel-backdrop" id="panelBackdrop"></div>
<div class="layout">
  <!-- ============ 控制面板 ============ -->
  <aside class="panel">
    <h1>📐 課前考產生器</h1>
    <div class="sub">資料驅動・對齊108課綱・可匯出 PDF</div>

    <div class="group">
      <label>學制</label>
      <div class="chips" id="stageChips"></div>
    </div>

    <div class="group">
      <div class="row">
        <div><label>年級</label><select id="gradeSel"></select></div>
        <div><label>學期</label><select id="semSel"></select></div>
      </div>
    </div>

    <div class="group">
      <label>版本</label>
      <select id="versionSel">
        <option value="通用">三版本通用（依課綱主題）</option>
        <option value="康軒">康軒</option>
        <option value="南一">南一</option>
        <option value="翰林">翰林</option>
      </select>
      <div class="hint">康軒／南一／翰林 113學年單元；切換版本會更新單元清單。</div>
    </div>

    <div class="group">
      <label>單元（勾選＋設定每單元題數）</label>
      <div class="units" id="unitList"></div>
      <div class="row" style="margin-top:6px">
        <button class="b-line" id="selAll">全選</button>
        <button class="b-line" id="selNone">全不選</button>
      </div>
    </div>

    <div class="group">
      <label>難度</label>
      <div class="chips" id="diffChips">
        <span class="chip" data-d="1">基礎</span>
        <span class="chip on" data-d="2">標準</span>
        <span class="chip" data-d="3">挑戰</span>
      </div>
    </div>

    <div class="group">
      <label>考卷設定</label>
      <select id="variantSel">
        <option value="1">單卷</option>
        <option value="2">A、B 卷</option>
        <option value="3">A、B、C 卷</option>
      </select>
      <input type="text" id="titleInput" placeholder="考卷標題" value="數學課前測驗">
      <div class="row" style="margin-top:8px">
        <input type="text" id="schoolInput" placeholder="學校名稱">
        <input type="text" id="classInput" placeholder="班級">
      </div>
      <div class="row" style="margin-top:8px">
        <input type="number" id="timeInput" min="0" placeholder="時間(分鐘)">
        <input type="number" id="pointsInput" min="0" value="4">
      </div>
      <label class="toggle" style="margin-top:10px"><input type="checkbox" id="stepsToggle"> 顯示詳解步驟</label>
      <div class="row" style="margin-top:8px">
        <div><label class="hint">每列題數</label><input type="number" id="colsInput" value="2" min="1" max="4"></div>
      </div>
      <label class="toggle" style="margin-top:10px"><input type="checkbox" id="ansToggle" checked> 附答案卷（自動分頁）</label>
      <label class="toggle" style="margin-top:6px"><input type="checkbox" id="bankToggle"> 混入我的題庫題目</label>
    </div>

    <div class="btns">
      <button class="b-primary" id="genBtn">🎲 生成考卷</button>
      <button class="b-soft" id="printBtn">🖨️ 列印 / 另存 PDF</button>
    </div>

    <details>
      <summary>📚 我的題庫（手動新增題目）</summary>
      <div class="hint" style="margin:6px 0">為目前選的「年級／學期／版本」下的某單元手動加題。存在瀏覽器，可匯出備份。</div>
      <select id="bankUnitSel"></select>
      <input type="text" id="bankQ" placeholder="題目（例：3/4 + 1/6 =）" style="margin-top:6px">
      <input type="text" id="bankA" placeholder="答案（例：11/12）" style="margin-top:6px">
      <button class="b-line" id="bankAdd" style="margin-top:6px;width:100%">＋ 加入題庫</button>
      <div id="bankList" style="margin-top:8px;font-size:12px"></div>
    </details>

    <details>
      <summary>💾 題庫備份</summary>
      <div class="btns" style="margin-top:8px">
        <button class="b-line" id="exportBtn">⬇️ 匯出題庫 JSON</button>
        <button class="b-line" id="importBtn">⬆️ 匯入題庫 JSON</button>
        <input type="file" id="importFile" accept="application/json" style="display:none">
      </div>
    </details>
  </aside>

  <!-- ============ 預覽 ============ -->
  <main class="preview">
    <div id="output"><div class="empty">在左側選好單元與題數，按「生成考卷」👈</div></div>
  </main>
</div>

<script>
/* =========================================================================
   1) 工具
   ========================================================================= */
const rnd = (a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick = arr => arr[rnd(0,arr.length-1)];
const gcd = (a,b)=>{a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a||1;};
const lcm = (a,b)=>a/gcd(a,b)*b;
// 分數渲染（HTML）
function F(n,d){ return `<span class="frac"><span class="n">${n}</span><span class="d">${d}</span></span>`; }
// 帶分數 / 真分數簡化後的字串（純文字，給答案用）
function fracStr(n,d){
  const g=gcd(n,d); n/=g; d/=g;
  if(d===1) return ''+n;
  const w=Math.floor(n/d), r=n%d;
  if(w>0 && r>0) return `${w} ${r}/${d}`;
  return `${n}/${d}`;
}
// 分數渲染（含帶分數）給題目顯示
function fracHTML(n,d){
  const g=gcd(n,d); n/=g; d/=g;
  if(d===1) return ''+n;
  const w=Math.floor(n/d), r=n%d;
  if(w>0 && r>0) return `${w}${F(r,d)}`;
  return F(n,d);
}

/* =========================================================================
   2) 題目生成器庫  gen(diff) -> {q:HTML, a:HTML/text}
   diff: 1基礎 2標準 3挑戰
   ========================================================================= */
const GEN = {
  // ---- 因數倍數 ----
  factors:(d)=>{const n=rnd(d*8,d*18+10);const fs=Array.from({length:n},(_, i)=>i+1).filter(x=>n%x===0);
    return{q:`求 ${n} 的所有因數：`,a:fs.join('、'),steps:[`${n} 可以被這些數整除：${fs.join('、')}`]};},
  gcd:(d)=>{const a=rnd(6,12*d),b=rnd(6,12*d);const ans=gcd(a,b);
    return{q:`(${a}, ${b}) 的最大公因數 =`,a:''+ans,steps:[`${a} 的因數：${Array.from({length:a},(_,i)=>i+1).filter(x=>a%x===0).join('、')}`,`${b} 的因數：${Array.from({length:b},(_,i)=>i+1).filter(x=>b%x===0).join('、')}`,`共同因數中最大的是 ${ans}`]};},
  lcm:(d)=>{const a=rnd(3,6*d),b=rnd(3,6*d);const ans=lcm(a,b);
    return{q:`[${a}, ${b}] 的最小公倍數 =`,a:''+ans,steps:[`最大公因數 = ${gcd(a,b)}`,`最小公倍數 = ${a} × ${b} ÷ 最大公因數 ${gcd(a,b)} = ${ans}`]};},
  // ---- 整數四則 ----
  intMixed:(d)=>{const a=rnd(10,30*d),b=rnd(2,9),c=rnd(10,40*d),e=rnd(2,9);
    const sum=a+b, mul=sum*e, ans=mul-c;
    return{q:`(${a} + ${b}) × ${e} − ${c} =`,a:''+ans,steps:[`先算括號：${a} + ${b} = ${sum}`,`再乘：${sum} × ${e} = ${mul}`,`最後相減：${mul} − ${c} = ${ans}`]};},
  // ---- 異分母分數加減 ----
  fracAddSub:(d)=>{const d1=rnd(2,5+d),d2=rnd(2,5+d);const n1=rnd(1,d1-1),n2=rnd(1,d2-1);
    const op=pick(['+','−']);const L=lcm(d1,d2);let num=op==='+'?n1*(L/d1)+n2*(L/d2):n1*(L/d1)-n2*(L/d2);
    if(op==='−'&&num<0)return GEN.fracAddSub(d);
    const left=n1*(L/d1), right=n2*(L/d2);
    return{q:`<span class="mexp">${fracHTML(n1,d1)} ${op} ${fracHTML(n2,d2)} =</span>`,a:fracStr(num,L),steps:[`先通分，公分母是 ${L}`,`${fracHTML(n1,d1)} = ${fracHTML(left,L)}，${fracHTML(n2,d2)} = ${fracHTML(right,L)}`,`${fracHTML(left,L)} ${op} ${fracHTML(right,L)} = ${fracHTML(num,L)} = ${fracStr(num,L)}`]};},
  // ---- 分數乘法 ----
  fracMul:(d)=>{const n1=rnd(1,4+d),d1=rnd(n1+1,6+d),n2=rnd(1,4+d),d2=rnd(n2+1,6+d);
    return{q:`<span class="mexp">${fracHTML(n1,d1)} × ${fracHTML(n2,d2)} =</span>`,a:fracStr(n1*n2,d1*d2),steps:[`分子乘分子、分母乘分母`,`${fracHTML(n1,d1)} × ${fracHTML(n2,d2)} = ${fracHTML(n1*n2,d1*d2)} = ${fracStr(n1*n2,d1*d2)}`]};},
  // ---- 分數除法 ----
  fracDiv:(d)=>{const n1=rnd(1,4+d),d1=rnd(n1+1,6+d),n2=rnd(1,4+d),d2=rnd(n2+1,6+d);
    return{q:`<span class="mexp">${fracHTML(n1,d1)} ÷ ${fracHTML(n2,d2)} =</span>`,a:fracStr(n1*d2,d1*n2),steps:[`除以分數等於乘以倒數`,`${fracHTML(n1,d1)} ÷ ${fracHTML(n2,d2)} = ${fracHTML(n1,d1)} × ${fracHTML(d2,n2)}`,`${fracHTML(n1*d2,d1*n2)} = ${fracStr(n1*d2,d1*n2)}`]};},
  // ---- 小數乘法 ----
  decMul:(d)=>{const a=(rnd(11,40*d)/10).toFixed(1),b=(rnd(11,30*d)/10).toFixed(1);
    const ans=(a*b).toFixed(2);
    return{q:`${a} × ${b} =`,a:ans,steps:[`先當整數算：${a.replace('.','')} × ${b.replace('.','')} = ${(+a*10)*(+b*10)}`,`兩個因數共有 2 位小數，答案往左點 2 位：${ans}`]};},
  // ---- 小數除法 ----
  decDiv:(d)=>{const b=(rnd(2,9)/(d>1?1:1)).toString(),ans=(rnd(11,30*d)/10).toFixed(1);
    const a=(b*ans).toFixed(1);return{q:`${a} ÷ ${b} =`,a:(+ans).toString(),steps:[`把被除數與除數同乘 10：${a} ÷ ${b} = ${a*10} ÷ ${b*10}`,`${a*10} ÷ ${b*10} = ${(+ans).toString()}`]};},
  // ---- 比率與百分率 ----
  percent:(d)=>{const whole=rnd(2,10)*rnd(5,20),p=pick([10,20,25,50,5,30,40,75]);
    const ans=whole*p/100;
    return{q:`${whole} 的 ${p}% 是多少？`,a:''+ans,steps:[`${p}% = ${fracHTML(p,100)}`,`${whole} × ${p} ÷ 100 = ${ans}`]};},
  // ---- 比與比值 ----
  ratio:(d)=>{const k=rnd(2,6),a=rnd(2,6),b=rnd(2,6);
    return{q:`${a*k} : ${b*k} 化成最簡單整數比 =`,a:`${a} : ${b}`,steps:[`兩邊同除以 ${k}`,`${a*k} : ${b*k} = ${a} : ${b}`]};},
  // ---- 平行四邊形/三角形/梯形面積 ----
  area:(d)=>{const t=pick(['平行四邊形','三角形','梯形']);
    if(t==='三角形'){const b=rnd(4,20),h=rnd(4,20),ans=b*h/2;return{q:`底 ${b} cm、高 ${h} cm 的三角形面積 =`,a:`${ans} 平方公分`,steps:[`面積 = 底 × 高 ÷ 2 = ${b} × ${h} ÷ 2 = ${ans}`]};}
    if(t==='梯形'){const u=rnd(3,12),lo=rnd(4,16),h=rnd(4,16),ans=(u+lo)*h/2;return{q:`上底 ${u}、下底 ${lo}、高 ${h}（cm）的梯形面積 =`,a:`${ans} 平方公分`,steps:[`面積 = (上底 + 下底) × 高 ÷ 2 = (${u} + ${lo}) × ${h} ÷ 2 = ${ans}`]};}
    const b=rnd(4,20),h=rnd(4,20),ans=b*h;return{q:`底 ${b} cm、高 ${h} cm 的平行四邊形面積 =`,a:`${ans} 平方公分`,steps:[`面積 = 底 × 高 = ${b} × ${h} = ${ans}`]};},
  // ---- 長方體體積/表面積 ----
  cuboid:(d)=>{const l=rnd(2,12),w=rnd(2,12),h=rnd(2,12);const mode=pick(['體積','表面積']);
    if(mode==='體積'){const ans=l*w*h;return{q:`長 ${l}、寬 ${w}、高 ${h}（cm）的長方體體積 =`,a:`${ans} 立方公分`,steps:[`體積 = 長 × 寬 × 高 = ${l} × ${w} × ${h} = ${ans}`]};}
    const ans=2*(l*w+l*h+w*h);return{q:`長 ${l}、寬 ${w}、高 ${h}（cm）的長方體表面積 =`,a:`${ans} 平方公分`,steps:[`表面積 = 2 × (長×寬 + 長×高 + 寬×高)`,`= 2 × (${l*w} + ${l*h} + ${w*h}) = ${ans}`]};},
  // ---- 圓周長 ----
  circleP:(d)=>{const r=rnd(2,15),ans=(2*r*3.14).toFixed(2);return{q:`半徑 ${r} cm 的圓周長 =（π取3.14）`,a:`${ans} 公分`,steps:[`圓周長 = 直徑 × π = ${r*2} × 3.14 = ${ans}`]};},
  // ---- 圓面積 ----
  circleA:(d)=>{const r=rnd(2,15),ans=(r*r*3.14).toFixed(2);return{q:`半徑 ${r} cm 的圓面積 =（π取3.14）`,a:`${ans} 平方公分`,steps:[`圓面積 = 半徑 × 半徑 × π = ${r} × ${r} × 3.14 = ${ans}`]};},
  // ---- 速率 ----
  speed:(d)=>{const v=rnd(3,12)*10,t=rnd(2,6),ans=v*t;return{q:`時速 ${v} 公里，行駛 ${t} 小時，共走多少公里？`,a:`${ans} 公里`,steps:[`距離 = 速率 × 時間 = ${v} × ${t} = ${ans}`]};},
  // ---- 等量公理列式 ----
  equation:(d)=>{const x=rnd(2,15),b=rnd(2,20),a=rnd(2,9);
    return{q:`${a} × □ + ${b} = ${a*x+b}，□ =`,a:''+x,steps:[`兩邊先減 ${b}：${a} × □ = ${a*x}`,`兩邊再除以 ${a}：□ = ${x}`]};},
  // ---- 時間計算 ----
  time:(d)=>{const h=rnd(1,5),m=rnd(1,11)*5,add=rnd(20,90);

/* ===== 創意題庫擴充：情境應用題（與計算題隨機交替，提升多元與創意） ===== */

const _pf=(maxD)=>{const dd=rnd(3,maxD);return [rnd(1,dd-1),dd];};
const WORD={
  gcd:(d)=>{const g=rnd(3,9),a=g*rnd(2,6),b=g*rnd(2,6),ans=gcd(a,b);
    return{q:`有兩條彩帶長 ${a} 公分和 ${b} 公分，要剪成一樣長且最長的小段，每段最長幾公分？`,a:`${ans} 公分`,steps:[`求 (${a}, ${b}) 的最大公因數 = ${ans} 公分`]};},
  lcm:(d)=>{const a=rnd(2,8),b=rnd(2,8),ans=lcm(a,b);
    return{q:`紅燈每 ${a} 秒閃一次、綠燈每 ${b} 秒閃一次，這次同時閃後，再過幾秒會再次同時閃？`,a:`${ans} 秒`,steps:[`求 [${a}, ${b}] 的最小公倍數 = ${ans} 秒`]};},
  intMixed:(d)=>{const price=rnd(15,40),qty=rnd(2,5),other=rnd(20,60),change=rnd(5,80),money=price*qty+other+change;

  fracAddSub:(d)=>{const [n1,d1]=_pf(6),[n2,d2]=_pf(6),L=lcm(d1,d2),sum=n1*(L/d1)+n2*(L/d2);
    return{q:`一條緞帶，做花用掉 ${fracHTML(n1,d1)} 公尺、包裝用掉 ${fracHTML(n2,d2)} 公尺，一共用掉多少公尺？`,a:`${fracStr(sum,L)} 公尺`,steps:[`通分，公分母 ${L}`,`${fracHTML(n1*(L/d1),L)} + ${fracHTML(n2*(L/d2),L)} = ${fracStr(sum,L)}`]};},
  fracMul:(d)=>{const [n,dd]=_pf(6),base=rnd(2,9),whole=base*dd,ans=base*n;
    return{q:`面積 ${whole} 平方公尺的菜園，其中 ${fracHTML(n,dd)} 用來種青菜，青菜佔多少平方公尺？`,a:`${ans} 平方公尺`,steps:[`${whole} × ${fracHTML(n,dd)} = ${whole} × ${n} ÷ ${dd} = ${ans}`]};},
  fracDiv:(d)=>{const dd=rnd(3,6),whole=rnd(2,6),ans=whole*dd;
    return{q:`有 ${whole} 公升果汁，每杯裝 ${fracHTML(1,dd)} 公升，可以裝滿幾杯？`,a:`${ans} 杯`,steps:[`${whole} ÷ ${fracHTML(1,dd)} = ${whole} × ${dd} = ${ans}`]};},
  decMul:(d)=>{const price=(rnd(15,60)/10).toFixed(1),kg=rnd(2,6),ans=+(price*kg).toFixed(2);
    return{q:`每公斤 ${price} 元的蘋果，買了 ${kg} 公斤，要付多少元？`,a:`${ans} 元`,steps:[`${price} × ${kg} = ${ans} 元`]};},
  decDiv:(d)=>{const n=rnd(2,6),each=(rnd(11,30)/10).toFixed(1),total=(each*n).toFixed(1);
    return{q:`一條 ${total} 公尺的繩子，平均剪成 ${n} 段，每段多長？`,a:`${+each} 公尺`,steps:[`${total} ÷ ${n} = ${+each} 公尺`]};},
  percent:(d)=>{const price=rnd(2,20)*50,z=rnd(5,9),pct=z*10,ans=price*pct/100,zc=['零','一','二','三','四','五','六','七','八','九'][z];
    return{q:`原價 ${price} 元的書打 ${zc}折，售價多少元？`,a:`${ans} 元`,steps:[`打${zc}折 = ${pct}%`,`${price} × ${pct}% = ${ans} 元`]};},
  ratio:(d)=>{const k=rnd(2,5),a=rnd(1,6),b=rnd(1,6),g=gcd(a,b);
    return{q:`班上男生 ${a*k} 人、女生 ${b*k} 人，男女人數的最簡單整數比 =`,a:`${a/g} : ${b/g}`,steps:[`${a*k} : ${b*k}，兩邊同除以 ${k*g}`,`= ${a/g} : ${b/g}`]};},
  area:(d)=>{if(rnd(0,1)){const l=rnd(4,15),w=rnd(3,12);return{q:`一間長方形教室長 ${l} 公尺、寬 ${w} 公尺，地板面積多少平方公尺？`,a:`${l*w} 平方公尺`,steps:[`面積 = 長 × 寬 = ${l} × ${w} = ${l*w}`]};}
    const b=rnd(4,16),h=rnd(4,16);return{q:`一面三角形旗子，底 ${b} 公分、高 ${h} 公分，面積多少平方公分？`,a:`${b*h/2} 平方公分`,steps:[`面積 = 底 × 高 ÷ 2 = ${b} × ${h} ÷ 2 = ${b*h/2}`]};},
  cuboid:(d)=>{const l=rnd(3,15),w=rnd(3,12),h=rnd(3,12);if(rnd(0,1))return{q:`一個長 ${l}、寬 ${w}、高 ${h}（公分）的長方體魚缸，最多能裝多少立方公分的水？`,a:`${l*w*h} 立方公分`,steps:[`容積 = 長 × 寬 × 高 = ${l} × ${w} × ${h} = ${l*w*h}`]};

  circleP:(d)=>{const r=rnd(2,15),ans=(2*r*3.14).toFixed(2);return{q:`一個半徑 ${r} 公分的車輪，滾一圈前進多少公分？（π取3.14）`,a:`${ans} 公分`,steps:[`周長 = 直徑 × π = ${2*r} × 3.14 = ${ans}`]};},
  circleA:(d)=>{const r=rnd(2,12),ans=(r*r*3.14).toFixed(2);return{q:`一個半徑 ${r} 公尺的圓形花園，面積多少平方公尺？（π取3.14）`,a:`${ans} 平方公尺`,steps:[`面積 = 半徑×半徑×π = ${r}×${r}×3.14 = ${ans}`]};},

  equation:(d)=>{const pens=rnd(2,6),pen=rnd(5,15),eraser=rnd(5,20),total=pens*pen+eraser;

    return{q:`一場電影 ${h} 時 ${m} 分開始，全長 ${len} 分鐘，幾點幾分結束？`,a:`${Math.floor(end/60)%24} 時 ${end%60} 分`,steps:[`${h}時${m}分 = ${start} 分；${start} + ${len} = ${end} 分`,`= ${Math.floor(end/60)%24} 時 ${end%60} 分`]};},

};

const BKEY='mathbank.v1';
function loadBank(){try{return JSON.parse(localStorage.getItem(BKEY))||{};}catch(e){return{};}}
function saveBank(b){localStorage.setItem(BKEY,JSON.stringify(b));}
function bankKey(uid){return `${stage}/${$('#gradeSel').value}/${$('#semSel').value}/${$('#versionSel').value}/${uid}`;}
function renderBankList(){
  const uid=$('#bankUnitSel').value;if(!uid){$('#bankList').innerHTML='';return;}
  const arr=(loadBank()[bankKey(uid)])||[];
  $('#bankList').innerHTML = arr.length? arr.map((x,i)=>
    `<div style="display:flex;gap:6px;padding:3px 0;border-bottom:1px solid #eee">
       <span style="flex:1">${x.q} <b style="color:#b91c1c">${x.a}</b></span>
       <a href="#" data-del="${i}" style="color:#b91c1c;text-decoration:none">✕</a></div>`).join('')
    : '<div style="color:#9aa1ad">此單元尚無自建題目</div>';
  $('#bankList').querySelectorAll('[data-del]').forEach(a=>a.onclick=ev=>{
    ev.preventDefault();const b=loadBank();b[bankKey(uid)].splice(+a.dataset.del,1);saveBank(b);renderBankList();});
}
$('#bankUnitSel').onchange=renderBankList;
$('#bankAdd').onclick=()=>{
  const q=$('#bankQ').value.trim(),a=$('#bankA').value.trim(),uid=$('#bankUnitSel').value;
  if(!q||!uid){alert('請輸入題目');return;}
  const b=loadBank();const k=bankKey(uid);(b[k]=b[k]||[]).push({q,a});saveBank(b);
  $('#bankQ').value='';$('#bankA').value='';renderBankList();
};
$('#exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(loadBank(),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='我的題庫.json';a.click();
};
$('#importBtn').onclick=()=>$('#importFile').click();
$('#importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const incoming=JSON.parse(r.result);const b=loadBank();
    Object.keys(incoming).forEach(k=>{b[k]=(b[k]||[]).concat(incoming[k]);});saveBank(b);renderBankList();alert('題庫已匯入合併');}
    catch(err){alert('檔案格式錯誤');}};r.readAsText(f);};

   ========================================================================= */
function gatherQuestions(){
  const units=curUnits();
  const bank=loadBank(), mix=$('#bankToggle').checked;
  const out=[]; // {sec, q, a, steps}
  document.querySelectorAll('#unitList input[type=checkbox]').forEach(cb=>{
    if(!cb.checked)return;
    const uid=cb.dataset.id, u=units.find(x=>x.id===uid);
    const n=+document.querySelector(`[data-cnt="${uid}"]`).value||0;
    if(n<=0)return;
    let pool=[];
    // 題庫題目
    const bq=mix?((bank[bankKey(uid)])||[]):[];
    bq.forEach(x=>pool.push({q:x.q,a:x.a,steps:x.steps||[]}));
    // 自動生成補滿
    if(u.gen && GEN[u.gen]){let guard=0;while(pool.length<n && guard<n*4){pool.push(GEN[u.gen](diff));guard++;}}
    // 截到 n 題
    pool=pool.slice(0,n);
    pool.forEach(p=>out.push({sec:u.name,q:p.q,a:p.a,steps:p.steps||[]}));
  });
  return out;
}

function render(){
  const variantCount=Math.max(1,Math.min(3,+$('#variantSel').value||1));
  const variantLabels=['A','B','C'];
  const papers=Array.from({length:variantCount},(_,i)=>({
    label:variantCount===1?'':variantLabels[i],
    qs:gatherQuestions()
  }));
  const box=$('#output');
  if(!papers.some(p=>p.qs.length)){box.innerHTML='<div class="empty">沒有可出的題目：請至少勾一個單元、題數&gt;0；無自動題的單元請開「混入題庫」並先建題。</div>';return;}
  const cols=Math.max(1,Math.min(4,+$('#colsInput').value||2));
  const title=$('#titleInput').value||'數學測驗';
  const showSteps=$('#stepsToggle').checked;
  const ver=$('#versionSel').value, gr=$('#gradeSel').value, sem=$('#semSel').value;
  const school=$('#schoolInput').value.trim();
  const className=$('#classInput').value.trim();
  const timeLimit=Math.max(0,+$('#timeInput').value||0);
  const points=Math.max(0,+$('#pointsInput').value||0);
  const subtitle=`${stage} ${gr}年級 ${sem}學期 ・ ${ver}`;

  const field=(label,value)=>`<span>${label}：${value?value:'<span class="fill"></span>'}</span>`;
  const head=(qs,label,answerTitle)=>{
    const totalPoints=qs.length*points;
    const suffix=label?`（${label}卷${answerTitle?'解答':''}）`:(answerTitle?'（解答）':'');
    return `<div class="paper-head">
      <div class="title">${title}${suffix}</div>
      <div class="meta">
        <span>${subtitle}</span>
        ${field('學校',school)}
        ${field('班級',className)}
        <span>姓名：<span class="fill"></span></span>
        <span>日期：<span class="fill"></span></span>
        ${timeLimit>0?`<span>時間：${timeLimit} 分鐘</span>`:''}
        <span>分數：<span class="fill"></span> / ${totalPoints} 分（共 ${qs.length} 題）</span>
      </div></div>`;
  };

  const stepHTML=it=>showSteps && it.steps && it.steps.length
    ? `<div class="steps">${it.steps.map(s=>`<div>${s}</div>`).join('')}</div>`
    : '';
  const sectionsHTML=(qs,showAns)=>{
    // 依單元分段，每份卷獨立編號，答案卷沿用同一份 qs。
    const bySec={};qs.forEach((x,i)=>{(bySec[x.sec]=bySec[x.sec]||[]).push({...x,gi:i+1});});
    return Object.keys(bySec).map(sec=>{
    const items=bySec[sec].map(it=>`<div class="q"><span class="no">${it.gi}.</span>
        <span class="body">${it.q} ${showAns?`<b>${it.a}</b>${stepHTML(it)}`:'<span class="ans-line"></span>'}</span></div>`).join('');
    return `<div class="sec-title">${sec}（每題 ${points} 分）</div><div class="qgrid" style="grid-template-columns:repeat(${cols},1fr)">${items}</div>`;
  }).join('');
  };
  const paperHTML=(paper,showAns,addPageBreak)=>`<div class="paper${addPageBreak?' pb':''}${showAns?' answers':''}">${head(paper.qs,paper.label,showAns)}${sectionsHTML(paper.qs,showAns)}</div>`;

  let html=papers.map((paper,i)=>paperHTML(paper,false,i>0)).join('');
  if($('#ansToggle').checked){
    html+=papers.map(paper=>paperHTML(paper,true,true)).join('');
  }
  box.innerHTML=html;
}
const togglePanel=(open)=>{const b=document.body,o=open===undefined?!b.classList.contains('panel-open'):open;b.classList.toggle('panel-open',o);};
$('#panelToggle').onclick=()=>togglePanel();
$('#panelBackdrop').onclick=()=>togglePanel(false);
$('#regenFab').onclick=()=>render();
$('#genBtn').onclick=()=>{render();if(window.matchMedia('(max-width:820px)').matches)togglePanel(false);};
$('#printBtn').onclick=()=>{if($('#output .empty'))render();window.print();};

/* =========================================================================
   7) 啟動
   ========================================================================= */
buildStageChips();fillGrades();
</script>
